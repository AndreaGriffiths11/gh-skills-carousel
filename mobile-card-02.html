<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Skills Card 2 - Distribution Problem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #f8fafc;
            background-image:
                radial-gradient(circle at top left, rgba(3, 7, 18, 0.06), transparent 55%),
                linear-gradient(180deg, rgba(14, 165, 233, 0.08), transparent 65%);
            padding: clamp(10px, 3vw, 40px);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(226, 232, 240, 0.6);
            border-radius: clamp(16px, 4vw, 24px);
            padding: clamp(1.5rem, 5vw, 3rem);
            box-shadow: 0 24px 48px -40px rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(10px);
            width: min(600px, calc(100vw - 20px));
            height: min(600px, calc(100vh - 20px));
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            aspect-ratio: 1 / 1;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: clamp(1rem, 3vw, 2rem);
            flex-shrink: 0;
        }
        
        .card-number {
            background: rgba(15, 23, 42, 0.08);
            color: #030712;
            padding: clamp(4px, 2vw, 6px) clamp(10px, 3vw, 14px);
            border-radius: 9999px;
            font-size: clamp(0.75rem, 2.5vw, 0.875rem);
            font-weight: 700;
            letter-spacing: 0.14em;
        }
        
        .github-logo {
            width: clamp(32px, 8vw, 40px);
            height: clamp(32px, 8vw, 40px);
            background: #030712;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: clamp(0.75rem, 2vw, 0.875rem);
            flex-shrink: 0;
        }
        
        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }
        
        .card-title {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 700;
            color: #030712;
            margin-bottom: clamp(1rem, 3vw, 1.5rem);
            line-height: 1.1;
            word-wrap: break-word;
            hyphens: auto;
        }
        
        .card-text {
            font-size: clamp(1rem, 3.5vw, 1.25rem);
            color: #475569;
            line-height: 1.6;
            word-wrap: break-word;
        }
        
        .card-text strong {
            color: #030712;
            font-weight: 600;
        }
        
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: clamp(1rem, 2vw, 1.5rem);
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            margin-top: auto;
            flex-shrink: 0;
            gap: 1rem;
        }
        
        .footer-text {
            font-size: clamp(0.75rem, 2.5vw, 0.875rem);
            color: #64748b;
            font-weight: 500;
            flex-shrink: 1;
        }
        
        .skill-badge {
            background: #030712;
            color: white;
            padding: clamp(0.3rem, 1.5vw, 0.5rem) clamp(0.6rem, 2vw, 1rem);
            border-radius: 8px;
            font-size: clamp(0.75rem, 2vw, 0.875rem);
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .card {
                width: calc(100vw - 20px);
                height: calc(100vw - 20px);
                max-height: calc(100vh - 20px);
            }
            
            .card-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .skill-badge {
                align-self: flex-end;
            }
        }
        
        @media (orientation: portrait) and (max-width: 600px) {
            .card {
                height: calc(100vw - 20px);
                max-height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="card-number">02 / 07</div>
            <div class="github-logo">GH</div>
        </div>
        
        <div class="card-content">
            <h2 class="card-title">The missing piece was distribution</h2>
            <div class="card-text">
                <strong>Copying files manually like it's 2012.</strong>
                <br><br>
                gh skill fixes that. No more hunting through GitHub repos, copying markdown files, or managing versions by hand.
            </div>
        </div>
        
        <div class="card-footer">
            <div class="footer-text">gh skill shipped April 16</div>
            <div class="skill-badge">GitHub CLI v2.90.0+</div>
        </div>
    </div>
</body>
</html>
